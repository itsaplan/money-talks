<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Talks — Your round is ready</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: #E8E0F8;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 16px 64px;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 460px;
    width: 100%;
    animation: rise 0.5s ease-out;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Success check */
  .check-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #FFFFFF;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    animation: pop 0.4s ease-out 0.2s both;
  }
  @keyframes pop {
    from { opacity: 0; transform: scale(0.5); }
    60% { transform: scale(1.1); }
    to { opacity: 1; transform: scale(1); }
  }
  .check-circle svg { width: 32px; height: 32px; }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 32px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 10px;
    line-height: 1.2;
  }
  .header p {
    font-size: 15px;
    color: #555;
    line-height: 1.5;
  }

  /* Cards */
  .card {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }

  /* Trip card */
  .trip-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
  }
  .trip-emoji {
    font-size: 40px;
    flex-shrink: 0;
  }
  .trip-info { flex: 1; }
  .trip-name {
    font-size: 20px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 12px;
  }
  .trip-details-divider {
    height: 1px;
    background: #EBEBEB;
    margin-bottom: 12px;
  }
  .trip-meta {
    display: flex;
    gap: 32px;
  }
  .trip-meta-item {}
  .trip-meta-label {
    font-size: 12px;
    color: #888;
    margin-bottom: 2px;
  }
  .trip-meta-value {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
  }

  /* Section label */
  .section-label {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #1a1a1a;
    margin-bottom: 12px;
  }

  /* Link box */
  .link-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
  }
  .link-text {
    flex: 1;
    font-size: 13px;
    color: #555;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    background: #F5F5F5;
    padding: 10px 14px;
    border-radius: 10px;
  }
  .copy-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .copy-btn:hover { background: #43A047; }
  .copy-btn:active { transform: scale(0.97); }
  .copy-btn.copied { background: #2E7D32; }
  .copy-btn svg { width: 16px; height: 16px; }

  /* WhatsApp message */
  .wa-card { padding: 0; overflow: hidden; }
  .wa-message {
    background: #F0F4E4;
    margin: 16px;
    border-radius: 12px;
    padding: 18px 20px;
    font-size: 14px;
    color: #333;
    line-height: 1.65;
    white-space: pre-wrap;
  }
  .wa-message .wa-link {
    color: #1976D2;
    word-break: break-all;
    text-decoration: underline;
  }
  .wa-message .wa-bold {
    font-weight: 600;
  }
  .wa-copy-wrap {
    padding: 0 16px 16px;
  }
  .wa-copy-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #7CB342;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .wa-copy-btn:hover { background: #689F38; }
  .wa-copy-btn:active { transform: scale(0.98); }
  .wa-copy-btn.copied { background: #2E7D32; }
  .wa-copy-btn svg { width: 18px; height: 18px; }

  /* What happens next */
  .next-card {
    background: #F3F0F0;
    border-radius: 16px;
    padding: 24px;
  }
  .next-title {
    font-size: 15px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 8px;
  }
  .next-body {
    font-size: 14px;
    color: #555;
    line-height: 1.6;
  }

  /* Error */
  .error-state {
    text-align: center;
    padding: 64px 24px;
    background: #FFFFFF;
    border-radius: 16px;
  }
  .error-state h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .error-state p { font-size: 14px; color: #555; }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    body { padding: 32px 12px 48px; }
    .header h1 { font-size: 26px; }
    .trip-meta { gap: 20px; }
    .link-card { flex-direction: column; align-items: stretch; }
    .copy-btn { justify-content: center; }
  }
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
  var params = new URLSearchParams(window.location.search);
  var roundCode = params.get('round_code') || '';
  var tripName = params.get('trip_name') || '';
  var occasion = params.get('occasion') || '';
  var budgetCovers = params.get('budget_covers') || '';
  var deadline = params.get('deadline') || '';

  var app = document.getElementById('app');

  // Pick emoji based on occasion
  var emojiMap = {
    'Bachelorette / Bachelor party': '\u{1F378}',
    'Trip with friends': '\u{2708}\u{FE0F}',
    'Birthday celebration': '\u{1F382}',
    'Holiday with family': '\u{1F334}',
    'Group dinner / night out': '\u{1F37D}\u{FE0F}',
    'Shared rental / Airbnb': '\u{1F3E0}',
  };
  var emoji = emojiMap[occasion] || '\u{1F4B0}';

  if (!roundCode || !tripName) {
    app.innerHTML = '<div class="error-state">'
      + '<h2>Something went wrong</h2>'
      + '<p>We couldn\'t find your round details. Please go back and submit the form again.</p>'
      + '</div>';
  } else {
    var memberLink = 'https://tally.so/r/Y5Ye4N'
      + '?round_code=' + encodeURIComponent(roundCode)
      + '&trip_name=' + encodeURIComponent(tripName)
      + '&occasion=' + encodeURIComponent(occasion)
      + '&budget_covers=' + encodeURIComponent(budgetCovers)
      + '&deadline=' + encodeURIComponent(deadline);

    var waPlain = 'Hey! \u{1F44B} I\'m starting to plan ' + tripName + ' and want to make sure the budget works for everyone.\n\nShare your budget privately before ' + (deadline || 'the deadline') + ' \u2014 no one sees each other\'s numbers, not even me. I just get the group range so I can plan something that works for all of us.\n\nTakes 30 seconds: ' + memberLink + '\n\nThanks! \u{1F64F}';

    app.innerHTML = ''
      // Check circle
      + '<div class="check-circle">'
      + '<svg viewBox="0 0 24 24" fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>'
      + '</div>'

      // Header
      + '<div class="header">'
      + '<h1>Your round is ready!</h1>'
      + '<p>Share the link or message with your group so everyone can submit their budget privately.</p>'
      + '</div>'

      // Trip card
      + '<div class="card trip-card">'
      + '<div class="trip-emoji">' + emoji + '</div>'
      + '<div class="trip-info">'
      + '<div class="trip-name">' + tripName + '</div>'
      + '<div class="trip-details-divider"></div>'
      + '<div class="trip-meta">'
      + (budgetCovers ? '<div class="trip-meta-item"><div class="trip-meta-label">Budget covers</div><div class="trip-meta-value">' + budgetCovers + '</div></div>' : '')
      + (deadline ? '<div class="trip-meta-item"><div class="trip-meta-label">Responses by</div><div class="trip-meta-value">' + deadline + '</div></div>' : '')
      + '</div>'
      + '</div>'
      + '</div>'

      // Sharing link
      + '<div class="section-label">Sharing link</div>'
      + '<div class="card link-card">'
      + '<div class="link-text" id="linkDisplay">' + memberLink + '</div>'
      + '<button class="copy-btn" id="copyLinkBtn" onclick="copyLink()">'
      + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>'
      + 'Copy'
      + '</button>'
      + '</div>'

      // WhatsApp message
      + '<div class="section-label">Ready-to-send message</div>'
      + '<div class="card wa-card">'
      + '<div class="wa-message">'
      + 'Hey! \u{1F44B} I\'m starting to plan <span class="wa-bold">' + tripName + '</span> and want to make sure the budget works for everyone.\n\n'
      + 'Share your budget privately before <span class="wa-bold">' + (deadline || 'the deadline') + '</span> \u2014 no one sees each other\'s numbers, not even me. I just get the group range so I can plan something that works for all of us.\n\n'
      + 'Takes 30 seconds: <span class="wa-link">' + memberLink + '</span>\n\n'
      + 'Thanks! \u{1F64F}'
      + '</div>'
      + '<div class="wa-copy-wrap">'
      + '<button class="wa-copy-btn" id="copyMsgBtn" onclick="copyMessage()">'
      + '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.516 3.516c4.686-4.686 12.284-4.686 16.97 0 4.686 4.686 4.686 12.283 0 16.97a12.004 12.004 0 01-13.754 2.299l-5.814.735a.392.392 0 01-.438-.44l.748-5.788A12.002 12.002 0 013.517 3.516zm3.61 17.043l.3.158a9.846 9.846 0 0011.534-1.758c3.843-3.843 3.843-10.074 0-13.918-3.843-3.843-10.075-3.843-13.918 0a9.846 9.846 0 00-1.747 11.554l.16.303-.51 3.942a.196.196 0 00.219.22l3.961-.501zm6.534-7.003l2.22 1.072c.205.099.39.199.574.343.301.234.525.578.606.978.094.46-.038.946-.263 1.355-.225.41-.54.783-.883 1.107a4.56 4.56 0 01-1.595.922 4.893 4.893 0 01-3.279-.09 11.046 11.046 0 01-3.131-1.78 13.157 13.157 0 01-2.481-2.655c-.648-.898-1.16-1.93-1.294-3.025A3.4 3.4 0 014.82 9.52a3.652 3.652 0 011.142-1.622c.43-.35.96-.566 1.523-.58.455-.01.836.12 1.148.399.29.26.519.6.72.978l.89 1.677a2.1 2.1 0 01.238.766c.021.318-.098.584-.248.816l-.442.66c-.14.214-.18.485-.063.728.23.474.67.984 1.193 1.457.547.493 1.13.9 1.737 1.156.236.1.483.06.68-.084l.523-.424c.222-.18.471-.299.759-.319.26-.019.516.069.74.178z"/></svg>'
      + 'Copy message'
      + '</button>'
      + '</div>'
      + '</div>'

      // What happens next
      + '<div class="next-card">'
      + '<div class="next-title">What happens next?</div>'
      + '<div class="next-body">Once everyone responds or the deadline passes, you\'ll automatically receive the results by email.</div>'
      + '</div>';
  }

  function copyLink() {
    navigator.clipboard.writeText(memberLink).then(function() {
      var btn = document.getElementById('copyLinkBtn');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg> Copied!';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy';
        btn.classList.remove('copied');
      }, 2500);
    });
  }

  function copyMessage() {
    navigator.clipboard.writeText(waPlain).then(function() {
      var btn = document.getElementById('copyMsgBtn');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg> Copied!';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.516 3.516c4.686-4.686 12.284-4.686 16.97 0 4.686 4.686 4.686 12.283 0 16.97a12.004 12.004 0 01-13.754 2.299l-5.814.735a.392.392 0 01-.438-.44l.748-5.788A12.002 12.002 0 013.517 3.516zm3.61 17.043l.3.158a9.846 9.846 0 0011.534-1.758c3.843-3.843 3.843-10.074 0-13.918-3.843-3.843-10.075-3.843-13.918 0a9.846 9.846 0 00-1.747 11.554l.16.303-.51 3.942a.196.196 0 00.219.22l3.961-.501zm6.534-7.003l2.22 1.072c.205.099.39.199.574.343.301.234.525.578.606.978.094.46-.038.946-.263 1.355-.225.41-.54.783-.883 1.107a4.56 4.56 0 01-1.595.922 4.893 4.893 0 01-3.279-.09 11.046 11.046 0 01-3.131-1.78 13.157 13.157 0 01-2.481-2.655c-.648-.898-1.16-1.93-1.294-3.025A3.4 3.4 0 014.82 9.52a3.652 3.652 0 011.142-1.622c.43-.35.96-.566 1.523-.58.455-.01.836.12 1.148.399.29.26.519.6.72.978l.89 1.677a2.1 2.1 0 01.238.766c.021.318-.098.584-.248.816l-.442.66c-.14.214-.18.485-.063.728.23.474.67.984 1.193 1.457.547.493 1.13.9 1.737 1.156.236.1.483.06.68-.084l.523-.424c.222-.18.471-.299.759-.319.26-.019.516.069.74.178z"/></svg> Copy message';
        btn.classList.remove('copied');
      }, 2500);
    });
  }
</script>

</body>
</html>
