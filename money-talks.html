<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Talks — Your round is ready</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: #E8E0F8;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 16px 64px;
    -webkit-font-smoothing: antialiased;
  }

  .material-symbols-rounded {
    font-size: 20px;
    vertical-align: middle;
  }

  .container {
    max-width: 460px;
    width: 100%;
    animation: rise 0.5s ease-out;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .check-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #FFFFFF;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    animation: pop 0.4s ease-out 0.2s both;
  }
  @keyframes pop {
    from { opacity: 0; transform: scale(0.5); }
    60% { transform: scale(1.1); }
    to { opacity: 1; transform: scale(1); }
  }
  .check-circle svg { width: 32px; height: 32px; }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 32px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 10px;
    line-height: 1.2;
  }
  .header p {
    font-size: 15px;
    color: #555;
    line-height: 1.5;
  }

  /* Cards — 10px corners, 2px black stroke */
  .card {
    background: #FFFFFF;
    border-radius: 10px;
    border: 2px solid #1a1a1a;
    padding: 24px;
    margin-bottom: 24px;
  }

  /* Trip card */
  .trip-card {
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  .trip-card-inner {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 24px;
  }
  .emoji-box {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    background: #FFDFAD;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }
  .trip-info { flex: 1; }
  .trip-name {
    font-size: 20px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 14px;
  }
  .trip-details-divider {
    height: 1px;
    background: #EBEBEB;
    margin-bottom: 14px;
  }
  .trip-meta {
    display: flex;
    gap: 32px;
  }
  .trip-meta-label {
    font-size: 12px;
    color: #888;
    margin-bottom: 2px;
  }
  .trip-meta-value {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
  }

  /* Section labels */
  .section-label {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #1a1a1a;
    margin-bottom: 12px;
  }

  /* Link card */
  .link-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
  }
  .link-text {
    flex: 1;
    font-size: 13px;
    color: #555;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    background: #F1F1E7;
    padding: 10px 14px;
    border-radius: 8px;
  }
  .copy-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: #5DAF0B;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .copy-btn:hover { background: #4E9A09; }
  .copy-btn:active { transform: scale(0.97); }
  .copy-btn.copied { background: #3B7A06; }

  /* WhatsApp message card */
  .wa-card { padding: 0; overflow: hidden; }
  .wa-message {
    background: #F1F1E7;
    margin: 16px;
    border-radius: 10px;
    padding: 18px 20px;
    font-size: 14px;
    color: #333;
    line-height: 1.65;
    white-space: pre-wrap;
  }
  .wa-message .wa-link {
    color: #1976D2;
    word-break: break-all;
    text-decoration: underline;
  }
  .wa-message .wa-bold {
    font-weight: 600;
  }
  .wa-copy-wrap {
    padding: 0 16px 16px;
  }
  .wa-copy-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #5DAF0B;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .wa-copy-btn:hover { background: #4E9A09; }
  .wa-copy-btn:active { transform: scale(0.98); }
  .wa-copy-btn.copied { background: #3B7A06; }

  /* What happens next */
  .next-card {
    background: #F7F2FF;
    border-radius: 10px;
    padding: 24px;
  }
  .next-title {
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #1a1a1a;
    margin-bottom: 8px;
  }
  .next-body {
    font-size: 14px;
    color: #555;
    line-height: 1.6;
  }

  /* Error */
  .error-state {
    text-align: center;
    padding: 64px 24px;
    background: #FFFFFF;
    border-radius: 10px;
    border: 2px solid #1a1a1a;
  }
  .error-state h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .error-state p { font-size: 14px; color: #555; }

  @media (max-width: 480px) {
    body { padding: 32px 12px 48px; }
    .header h1 { font-size: 26px; }
    .trip-meta { gap: 20px; }
    .link-card { flex-direction: column; align-items: stretch; }
    .copy-btn { justify-content: center; }
  }
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
  var params = new URLSearchParams(window.location.search);
  var roundCode = params.get('round_code') || '';
  var tripName = params.get('trip_name') || '';
  var occasion = params.get('occasion') || '';
  var budgetCovers = params.get('budget_covers') || '';
  var deadlineParam = params.get('deadline') || '';

  var app = document.getElementById('app');

  // Format deadline as "Day, Nth of Month"
  function formatDeadline(raw) {
    if (!raw) return '';
    var d = new Date(raw);
    if (isNaN(d.getTime())) return raw; // fallback to raw string if not parseable

    var days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    var months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

    var dayName = days[d.getDay()];
    var date = d.getDate();
    var month = months[d.getMonth()];

    // Ordinal suffix
    var suffix = 'th';
    if (date === 1 || date === 21 || date === 31) suffix = 'st';
    else if (date === 2 || date === 22) suffix = 'nd';
    else if (date === 3 || date === 23) suffix = 'rd';

    return dayName + ', ' + date + suffix + ' of ' + month;
  }

  var deadline = formatDeadline(deadlineParam) || deadlineParam;

  // Emoji based on occasion
  var emojiMap = {
    'Bachelorette': '\u{1F378}',
    'Trip with friends': '\u{2708}\u{FE0F}',
    'Birthday celebration': '\u{1F382}',
    'Holiday with family': '\u{1F334}',
    'Group dinner / night out': '\u{1F37D}\u{FE0F}',
    'Shared rental / Airbnb': '\u{1F3E0}',
    'Other': '\u{1F4B0}',
  };
  var emoji = emojiMap[occasion] || '\u{1F4B0}';

  if (!roundCode || !tripName) {
    app.innerHTML = '<div class="error-state">'
      + '<h2>Something went wrong</h2>'
      + '<p>We couldn\'t find your round details. Please go back and submit the form again.</p>'
      + '</div>';
  } else {
    var memberLink = 'https://tally.so/r/Y5Ye4N'
      + '?round_code=' + encodeURIComponent(roundCode)
      + '&trip_name=' + encodeURIComponent(tripName)
      + '&occasion=' + encodeURIComponent(occasion)
      + '&budget_covers=' + encodeURIComponent(budgetCovers)
      + '&deadline=' + encodeURIComponent(deadline);

    var waPlain = 'Hey! \u{1F44B} I\'m starting to plan ' + tripName + ' and want to make sure the budget works for everyone.\n\nShare your budget privately before ' + (deadline || 'the deadline') + ' \u2014 no one sees each other\'s numbers, not even me. I just get the group range so I can plan something that works for all of us.\n\nTakes 30 seconds: ' + memberLink + '\n\nThanks! \u{1F64F}';

    app.innerHTML = ''
      + '<div class="check-circle">'
      + '<svg viewBox="0 0 24 24" fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>'
      + '</div>'

      + '<div class="header">'
      + '<h1>Your round is ready!</h1>'
      + '<p>Share the link or message with your group so everyone can submit their budget privately.</p>'
      + '</div>'

      // Trip card
      + '<div class="card trip-card">'
      + '<div class="trip-card-inner">'
      + '<div class="emoji-box">' + emoji + '</div>'
      + '<div class="trip-info">'
      + '<div class="trip-name">' + tripName + '</div>'
      + '<div class="trip-details-divider"></div>'
      + '<div class="trip-meta">'
      + (budgetCovers ? '<div class="trip-meta-item"><div class="trip-meta-label">Budget covers</div><div class="trip-meta-value">' + budgetCovers + '</div></div>' : '')
      + (deadline ? '<div class="trip-meta-item"><div class="trip-meta-label">Responses by</div><div class="trip-meta-value">' + deadline + '</div></div>' : '')
      + '</div>'
      + '</div>'
      + '</div>'
      + '</div>'

      // Sharing link
      + '<div class="section-label">Sharing link</div>'
      + '<div class="card link-card">'
      + '<div class="link-text" id="linkDisplay">' + memberLink + '</div>'
      + '<button class="copy-btn" id="copyLinkBtn" onclick="copyLink()">'
      + '<span class="material-symbols-rounded">content_copy</span>'
      + 'Copy link'
      + '</button>'
      + '</div>'

      // Message
      + '<div class="section-label">Ready-to-send message</div>'
      + '<div class="card wa-card">'
      + '<div class="wa-message">'
      + 'Hey! \u{1F44B} I\'m starting to plan <span class="wa-bold">' + tripName + '</span> and want to make sure the budget works for everyone.\n\n'
      + 'Share your budget privately before <span class="wa-bold">' + (deadline || 'the deadline') + '</span> \u2014 no one sees each other\'s numbers, not even me. I just get the group range so I can plan something that works for all of us.\n\n'
      + 'Takes 30 seconds: <span class="wa-link">' + memberLink + '</span>\n\n'
      + 'Thanks! \u{1F64F}'
      + '</div>'
      + '<div class="wa-copy-wrap">'
      + '<button class="wa-copy-btn" id="copyMsgBtn" onclick="copyMessage()">'
      + '<span class="material-symbols-rounded">send</span>'
      + 'Copy message'
      + '</button>'
      + '</div>'
      + '</div>'

      // What happens next
      + '<div class="next-card">'
      + '<div class="next-title">WHAT HAPPENS NEXT?</div>'
      + '<div class="next-body">Once everyone responds or the deadline passes, you\'ll automatically receive the results by email.</div>'
      + '</div>';
  }

  function copyLink() {
    navigator.clipboard.writeText(memberLink).then(function() {
      var btn = document.getElementById('copyLinkBtn');
      btn.innerHTML = '<span class="material-symbols-rounded">check</span> Copied!';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.innerHTML = '<span class="material-symbols-rounded">content_copy</span> Copy link';
        btn.classList.remove('copied');
      }, 2500);
    });
  }

  function copyMessage() {
    navigator.clipboard.writeText(waPlain).then(function() {
      var btn = document.getElementById('copyMsgBtn');
      btn.innerHTML = '<span class="material-symbols-rounded">check</span> Copied!';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.innerHTML = '<span class="material-symbols-rounded">send</span> Copy message';
        btn.classList.remove('copied');
      }, 2500);
    });
  }
</script>

</body>
</html>
